name: Agent rehearse

# Manual liveness probe for the hosted Foundry triage agent. POSTs a
# side-effect-free `event: "ping"` payload to the live invocations endpoint
# and asserts HTTP 200 "OK: pong …". Doesn't mint a GitHub App token, doesn't
# call the LLM, doesn't touch any issue. Use this AFTER an `azd deploy` (or
# at any time) to confirm the agent is reachable in <2 min instead of
# discovering an outage via a real user opening a real issue.
#
# Run it from the Actions tab → "Agent rehearse" → "Run workflow", or via
# `gh workflow run agent-rehearse.yml`.
on:
  workflow_dispatch:

permissions:
  id-token: write   # OIDC into Azure for the bearer token
  contents: read

# Don't pile rehearsals on top of each other. They're cheap, but stacking
# them gives noisy concurrent telemetry that obscures real signal.
concurrency:
  group: agent-rehearse-${{ github.repository_id }}
  cancel-in-progress: false

jobs:
  rehearse:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ping Foundry hosted agent
        env:
          INVOCATIONS_URL: ${{ vars.FOUNDRY_INVOCATIONS_URL }}
        run: |
          set -euo pipefail
          TOKEN=$(az account get-access-token --resource https://ai.azure.com --query accessToken -o tsv)

          # Distinct, run-scoped session id so a rehearsal never collides with
          # a real issue thread on the Foundry Responses-API server.
          SESSION_ID="gh-rehearse-${GITHUB_RUN_ID}"

          # Minimal payload. The handler short-circuits on `event:"ping"` BEFORE
          # the owner/repo/issue_number validation, so the dummy values below
          # are never inspected.
          jq -n '{event:"ping", owner:"_", repo:"_", issue_number:1}' > /tmp/payload.json

          # Same retry loop as triage.yml — Foundry returns 424
          # session_not_ready while a cold container spins up, which a probe
          # MUST tolerate (otherwise every post-deploy ping races cold-start
          # and cries wolf). 4 attempts, exponential backoff 8/16/32s. Real
          # outages (today's Foundry MI regression) exhaust all retries and
          # fail loudly with the final HTTP code.
          attempt=0
          max_attempts=4
          while : ; do
            attempt=$((attempt+1))
            set +e
            HTTP_CODE=$(curl -sS -X POST "${INVOCATIONS_URL}&agent_session_id=${SESSION_ID}" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -H "Foundry-Features: HostedAgents=V1Preview" \
              --data-binary @/tmp/payload.json \
              --max-time 90 \
              -o /tmp/reply.txt \
              -w '%{http_code}')
            CURL_EXIT=$?
            set -e
            if [ "$CURL_EXIT" -ne 0 ]; then
              echo "Attempt ${attempt}/${max_attempts}: curl exit=${CURL_EXIT} (HTTP=${HTTP_CODE:-none}) — treating as transient."
              HTTP_CODE="000"
            else
              echo "Attempt ${attempt}/${max_attempts}: HTTP ${HTTP_CODE}"
            fi
            case "$HTTP_CODE" in
              200) break ;;
              000|408|424|425|429|5??)
                if [ "$attempt" -ge "$max_attempts" ]; then
                  echo "::warning::Giving up after ${attempt} attempts (last HTTP ${HTTP_CODE})."
                  break
                fi
                backoff=$((8 * (2 ** (attempt - 1))))
                echo "Transient HTTP ${HTTP_CODE} — sleeping ${backoff}s before retry."
                sleep "$backoff"
                ;;
              *) break ;;
            esac
          done

          echo "Final HTTP: ${HTTP_CODE} (last curl exit ${CURL_EXIT})"
          echo "Body:"
          cat /tmp/reply.txt
          echo

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Agent rehearse FAILED — expected HTTP 200, got ${HTTP_CODE} after ${attempt} attempts."
            exit 1
          fi
          if ! grep -q '^OK: pong' /tmp/reply.txt; then
            echo "::error::Agent rehearse FAILED — HTTP 200 but body did not match 'OK: pong …'."
            exit 1
          fi
          echo "::notice::Agent rehearse OK — container is alive and Foundry routing works."
