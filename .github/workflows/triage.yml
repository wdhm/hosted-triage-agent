name: Triage Agent

on:
  issues:
    types: [opened]

permissions:
  # The agent posts the comment and labels itself via the GitHub MCP server,
  # using a PAT stored in the Foundry project connection. The workflow itself
  # only needs id-token (to OIDC into Azure) and contents:read.
  id-token: write
  contents: read

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Invoke Foundry hosted triage agent
        env:
          INVOCATIONS_URL: ${{ vars.FOUNDRY_INVOCATIONS_URL }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          set -euo pipefail
          TOKEN=$(az account get-access-token --resource https://ai.azure.com --query accessToken -o tsv)

          # Build the JSON payload safely (jq handles all the quoting / escaping).
          jq -n \
            --arg owner   "$REPO_OWNER" \
            --arg repo    "$REPO_NAME" \
            --argjson num  "$ISSUE_NUMBER" \
            --arg title   "$ISSUE_TITLE" \
            --arg body    "${ISSUE_BODY:-}" \
            '{owner:$owner, repo:$repo, issue_number:$num, title:$title, body:$body}' \
            > /tmp/payload.json

          # Log shape only — never the body, which is untrusted user content.
          echo "Payload: owner=$REPO_OWNER repo=$REPO_NAME issue=$ISSUE_NUMBER titleLen=${#ISSUE_TITLE} bodyLen=${#ISSUE_BODY}"

          # The agent posts the comment and labels via GitHub MCP. The reply is
          # a one-line status string starting with "OK:" or "FAILED:". The
          # handler returns 502 on FAILED, so curl -f will exit non-zero and the
          # workflow turns red automatically.
          curl -fsS -X POST "$INVOCATIONS_URL" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -H "Foundry-Features: HostedAgents=V1Preview" \
            --data-binary @/tmp/payload.json \
            -o /tmp/reply.txt
          echo "Agent status:"
          cat /tmp/reply.txt
          echo
