name: Triage Agent

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  # The agent posts the comment and labels itself via the GitHub MCP server,
  # using a PAT stored in the Foundry project connection. The workflow itself
  # only needs id-token (to OIDC into Azure) and contents:read.
  id-token: write
  contents: read

# Per-issue concurrency: prevents double-clicks, retries, and rapid follow-ups
# from racing on the same Foundry session. We don't cancel in-progress runs —
# that would leave the agent mid-tool-call. Just queue the next one.
concurrency:
  group: triage-${{ github.repository_id }}-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  triage:
    # Gate: only run on issues.opened, OR on issue_comment.created when:
    #   - it's an issue (not a PR comment)
    #   - the comment is NOT our agent's own reply (two-layer loop prevention:
    #     hidden HTML marker in the body AND the [bot] suffix on the author —
    #     either is sufficient on its own)
    #   - the comment body @-mentions the agent
    if: |
      github.event_name == 'issues' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request == null &&
       !contains(github.event.comment.body, '<!-- triage-agent-reply -->') &&
       !endsWith(github.event.comment.user.login, '[bot]') &&
       contains(github.event.comment.body, '@wdhm-triage-agent'))
    runs-on: ubuntu-latest
    steps:
      - name: Mint GitHub App installation token
        id: app-token
        # Mint a per-run installation token (valid 1h) so the agent posts
        # comments/labels with its own bot identity (`<app>[bot]`) instead of
        # the PAT owner. Requires repo secrets TRIAGE_AGENT_APP_ID and
        # TRIAGE_AGENT_APP_PRIVATE_KEY to be set; if they're missing this step
        # fails and the workflow stops. (We can't gate on `secrets.X != ''` in
        # an `if:` — GitHub rejects reading the secrets context in conditional
        # expressions, which silently invalidates the whole workflow file.)
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.TRIAGE_AGENT_APP_ID }}
          private-key: ${{ secrets.TRIAGE_AGENT_APP_PRIVATE_KEY }}
          # Only mint a token scoped to this repo, not the whole installation.
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Invoke Foundry hosted triage agent
        env:
          INVOCATIONS_URL: ${{ vars.FOUNDRY_INVOCATIONS_URL }}
          EVENT_NAME: ${{ github.event_name }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          GITHUB_APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          TOKEN=$(az account get-access-token --resource https://ai.azure.com --query accessToken -o tsv)

          # Stable per-issue session ID — all turns on the same issue use this
          # so the agent has full conversation memory via Foundry's thread store.
          # Lowercased to match the handler's path-sanitizing rules.
          SESSION_ID=$(echo "gh-${REPO_OWNER}-${REPO_NAME}-${ISSUE_NUMBER}" | tr '[:upper:]' '[:lower:]')

          # Map GitHub event_name -> our internal event field
          if [ "$EVENT_NAME" = "issues" ]; then
            EVENT="issue.opened"
          else
            EVENT="issue_comment.created"
          fi

          # Build the JSON payload safely (jq handles all the quoting / escaping).
          # We always send title+body (current state, in case the issue was edited
          # since opening). comment_* fields are only populated for comment events.
          # NOTE: We embed the GitHub App installation token in the JSON body
          # (not a custom header) because Foundry's hosted-agent invocation
          # gateway strips all non-allowlisted request headers before the
          # handler sees them — including X-GitHub-Token. The token lives in
          # the body field `github_token` and is consumed by the handler then
          # immediately pushed onto an AsyncLocal for the per-request MCP
          # auth handler. It is never logged or echoed back.
          jq -n \
            --arg event   "$EVENT" \
            --arg owner   "$REPO_OWNER" \
            --arg repo    "$REPO_NAME" \
            --argjson num  "$ISSUE_NUMBER" \
            --arg title   "$ISSUE_TITLE" \
            --arg body    "${ISSUE_BODY:-}" \
            --arg author  "${COMMENT_AUTHOR:-}" \
            --arg comment "${COMMENT_BODY:-}" \
            --arg ghtoken "${GITHUB_APP_TOKEN:-}" \
            '{event:$event, owner:$owner, repo:$repo, issue_number:$num, title:$title, body:$body, comment_author:$author, comment_body:$comment, github_token:$ghtoken}' \
            > /tmp/payload.json

          # Log shape only — never the body/comment/token, which are untrusted or secret.
          echo "Payload: event=$EVENT session=$SESSION_ID owner=$REPO_OWNER repo=$REPO_NAME issue=$ISSUE_NUMBER titleLen=${#ISSUE_TITLE} bodyLen=${#ISSUE_BODY} commentLen=${#COMMENT_BODY} author=${COMMENT_AUTHOR:-none} ghTokenLen=${#GITHUB_APP_TOKEN}"
          if [ -n "${GITHUB_APP_TOKEN:-}" ]; then
            echo "GitHub App token present — agent will post as <app>[bot]."
          else
            echo "No GitHub App token — agent will use PAT fallback."
          fi

          # The agent posts the comment (and labels, for issue.opened) via GitHub
          # MCP itself. The reply is a one-line status string starting with "OK:"
          # or "FAILED:". The handler returns 502 on FAILED, so curl -f exits
          # non-zero and the workflow turns red automatically.
          # IMPORTANT: INVOCATIONS_URL already contains '?api-version=v1', so we
          # MUST append session id with '&' (not '?'). Two '?' chars cause Foundry
          # to reject with HTTP 400 "API version not supported" because the parser
          # reads api-version's value as "v1?agent_session_id=...".
          HTTP_CODE=$(curl -sS -X POST "${INVOCATIONS_URL}&agent_session_id=${SESSION_ID}" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -H "Foundry-Features: HostedAgents=V1Preview" \
            --data-binary @/tmp/payload.json \
            --retry 5 --retry-all-errors --retry-delay 10 --max-time 120 \
            -o /tmp/reply.txt \
            -w '%{http_code}')
          echo "HTTP: $HTTP_CODE"
          echo "Agent response body:"
          cat /tmp/reply.txt
          echo
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Foundry returned HTTP $HTTP_CODE"
            exit 1
          fi
