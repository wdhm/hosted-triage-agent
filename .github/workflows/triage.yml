name: Triage Agent

on:
  issues:
    types: [opened]

permissions:
  issues: write
  id-token: write
  contents: read

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Invoke Foundry hosted agent
        id: invoke
        env:
          INVOCATIONS_URL: ${{ vars.FOUNDRY_INVOCATIONS_URL }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          set -euo pipefail
          TOKEN=$(az account get-access-token --resource https://ai.azure.com --query accessToken -o tsv)
          printf 'Title: %s\n\nBody:\n%s\n' "$ISSUE_TITLE" "$ISSUE_BODY" > /tmp/payload.txt
          curl -fsS -X POST "$INVOCATIONS_URL" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: text/plain" \
            -H "Foundry-Features: HostedAgents=V1Preview" \
            --data-binary @/tmp/payload.txt \
            -o /tmp/reply.json
          echo "Agent reply:"
          cat /tmp/reply.json
          echo

      - name: Format reply and post comment + labels
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail

          SEVERITY=$(jq -r '.severity // "unknown"'  /tmp/reply.json)
          CATEGORY=$(jq -r '.category // "unknown"'  /tmp/reply.json)
          SUMMARY=$(jq -r  '.summary // ""'          /tmp/reply.json)
          ROOT_CAUSE=$(jq -r '.root_cause // ""'     /tmp/reply.json)
          LABELS_CSV=$(jq -r '(.suggested_labels // []) | join(",")' /tmp/reply.json)
          NEXT_ACTIONS=$(jq -r '(.next_actions // []) | map("- " + .) | join("\n")' /tmp/reply.json)

          # Severity emoji
          case "$SEVERITY" in
            critical) BADGE="🔴 **CRITICAL**" ;;
            high)     BADGE="🟠 **HIGH**" ;;
            medium)   BADGE="🟡 **MEDIUM**" ;;
            low)      BADGE="🟢 **LOW**" ;;
            *)        BADGE="⚪ **${SEVERITY}**" ;;
          esac

          {
            echo "🤖 **triage-agent**"
            echo
            echo "| Severity | Category |"
            echo "|---|---|"
            echo "| ${BADGE} | \`${CATEGORY}\` |"
            echo
            echo "**Summary**"
            echo
            echo "> ${SUMMARY}"
            echo
            echo "**Likely root cause**"
            echo
            echo "${ROOT_CAUSE}"
            if [ -n "${NEXT_ACTIONS}" ]; then
              echo
              echo "**Suggested next actions**"
              echo
              echo "${NEXT_ACTIONS}"
            fi
            if [ -n "${LABELS_CSV}" ]; then
              echo
              echo "**Suggested labels:** \`${LABELS_CSV//,/\`, \`}\`"
            fi
            echo
            echo "<sub><em>Hosted in Microsoft Foundry · model \`gpt-5-mini\` · structured JSON output</em></sub>"
            echo
            echo "<!-- triage-agent-signature -->"
          } > /tmp/comment.md

          gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body-file /tmp/comment.md

          # Best-effort apply labels — create missing labels on the fly with a neutral color.
          if [ -n "${LABELS_CSV}" ]; then
            IFS=',' read -ra LABELS <<< "$LABELS_CSV"
            for L in "${LABELS[@]}"; do
              gh label create "$L" --color BFD4F2 --repo "$REPO" 2>/dev/null || true
              gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --add-label "$L" || true
            done
          fi
