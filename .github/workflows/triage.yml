name: Triage Agent

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  # The agent posts comments and labels itself by calling the GitHub REST API
  # directly with a GitHub App installation token minted below. The workflow
  # itself only needs id-token (to OIDC into Azure) and contents:read.
  id-token: write
  contents: read

# Per-issue concurrency: prevents double-clicks, retries, and rapid follow-ups
# from racing on the same Foundry session. We don't cancel in-progress runs —
# that would leave the agent mid-tool-call. Just queue the next one.
concurrency:
  group: triage-${{ github.repository_id }}-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  triage:
    # Gate: only run on issues.opened, OR on issue_comment.created when:
    #   - it's an issue (not a PR comment)
    #   - the comment is NOT our agent's own reply (two-layer loop prevention:
    #     hidden HTML marker in the body AND the [bot] suffix on the author —
    #     either is sufficient on its own)
    #   - the comment body @-mentions the agent
    if: |
      github.event_name == 'issues' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request == null &&
       !contains(github.event.comment.body, '<!-- triage-agent-reply -->') &&
       !endsWith(github.event.comment.user.login, '[bot]') &&
       contains(github.event.comment.body, '@wdhm-triage-agent'))
    runs-on: ubuntu-latest
    steps:
      - name: Mint GitHub App installation token
        id: app-token
        # Mint a per-run installation token (valid 1h) so the agent posts
        # comments/labels with its own bot identity (`<app>[bot]`) instead of
        # the PAT owner. Requires repo secrets TRIAGE_AGENT_APP_ID and
        # TRIAGE_AGENT_APP_PRIVATE_KEY to be set; if they're missing this step
        # fails and the workflow stops. (We can't gate on `secrets.X != ''` in
        # an `if:` — GitHub rejects reading the secrets context in conditional
        # expressions, which silently invalidates the whole workflow file.)
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.TRIAGE_AGENT_APP_ID }}
          private-key: ${{ secrets.TRIAGE_AGENT_APP_PRIVATE_KEY }}
          # Only mint a token scoped to this repo, not the whole installation.
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Invoke Foundry hosted triage agent
        env:
          INVOCATIONS_URL: ${{ vars.FOUNDRY_INVOCATIONS_URL }}
          EVENT_NAME: ${{ github.event_name }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          GITHUB_APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          TOKEN=$(az account get-access-token --resource https://ai.azure.com --query accessToken -o tsv)

          # Per-attempt Foundry agent_session_id.
          #
          # Foundry's agent_session_id is a routing key: it pins a request to
          # a specific per-session VM. It is NOT where conversation memory
          # lives — that's the AgentSession.ConversationId we round-trip via
          # the `<!-- foundry-session: ... -->` marker on our bot comment.
          # (Confirmed against the platform docs and the agent-framework
          # source; see PR #76 / the "Why we rotate session_id" notes in
          # README.md section 5.)
          #
          # We've observed two distinct ways the platform binds a session_id
          # to a doomed container:
          #
          #   1. issue.opened bursts: parallel cold-starts race on auth init.
          #      One container wedges; retries pinned to the same
          #      session_id keep hitting the same wedged container forever.
          #
          #   2. issue_comment.created after a long idle: the stable
          #      session_id is still bound to a worker Foundry has already
          #      scaled away; the gateway returns HTTP 424
          #      "session_not_ready" and never forwards to a fresh
          #      container.
          #
          # Strategy:
          #
          #   - issue.opened uses a fresh, run-and-attempt-scoped session_id
          #     every single time. There is no first-turn memory to
          #     preserve, so the warm-path benefit of a stable id is zero.
          #     Burning a per-event session avoids inheriting any wedge from
          #     a prior run.
          #
          #   - issue_comment.created keeps a stable per-issue session_id on
          #     attempt 1 (so a quick follow-up comment lands on the warm
          #     container that just served the previous turn — fastest
          #     path). On attempt 2+ we uniquify with "-r{N}" to force
          #     Foundry to re-route to a fresh container. The handler
          #     hydrates conversation state from the comment marker
          #     regardless of which container picks up the call, so
          #     rotation is lossless.
          STABLE_BASE=$(echo "gh-${REPO_OWNER}-${REPO_NAME}-${ISSUE_NUMBER}" | tr '[:upper:]' '[:lower:]')

          # Map GitHub event_name -> our internal event field
          if [ "$EVENT_NAME" = "issues" ]; then
            EVENT="issue.opened"
          else
            EVENT="issue_comment.created"
          fi

          # Build the JSON payload safely (jq handles all the quoting / escaping).
          # We always send title+body (current state, in case the issue was edited
          # since opening). comment_* fields are only populated for comment events.
          # NOTE: We embed the GitHub App installation token in the JSON body
          # (not a custom header) because Foundry's hosted-agent invocation
          # gateway strips all non-allowlisted request headers before the
          # handler sees them — including X-GitHub-Token. The token lives in
          # the body field `github_token` and is consumed by the handler then
          # immediately pushed onto an AsyncLocal that the REST tools read
          # when calling api.github.com. It is never logged or echoed back.
          jq -n \
            --arg event   "$EVENT" \
            --arg owner   "$REPO_OWNER" \
            --arg repo    "$REPO_NAME" \
            --argjson num  "$ISSUE_NUMBER" \
            --arg title   "$ISSUE_TITLE" \
            --arg body    "${ISSUE_BODY:-}" \
            --arg author  "${COMMENT_AUTHOR:-}" \
            --arg comment "${COMMENT_BODY:-}" \
            --arg ghtoken "${GITHUB_APP_TOKEN:-}" \
            '{event:$event, owner:$owner, repo:$repo, issue_number:$num, title:$title, body:$body, comment_author:$author, comment_body:$comment, github_token:$ghtoken}' \
            > /tmp/payload.json

          # Log shape only — never the body/comment/token, which are untrusted or secret.
          echo "Payload: event=$EVENT session=$STABLE_BASE owner=$REPO_OWNER repo=$REPO_NAME issue=$ISSUE_NUMBER titleLen=${#ISSUE_TITLE} bodyLen=${#ISSUE_BODY} commentLen=${#COMMENT_BODY} author=${COMMENT_AUTHOR:-none} ghTokenLen=${#GITHUB_APP_TOKEN}"
          if [ -n "${GITHUB_APP_TOKEN:-}" ]; then
            echo "GitHub App token present — agent will post as <app>[bot]."
          else
            echo "::error::No GitHub App token present — the agent cannot post comments. Check TRIAGE_AGENT_APP_ID / TRIAGE_AGENT_APP_PRIVATE_KEY repo secrets."
            exit 1
          fi

          # The agent posts the comment (and labels, for issue.opened) by
          # calling the GitHub REST API directly. The reply is a one-line
          # status string starting with "OK:" or "FAILED:". The handler
          # returns 502 on FAILED, so curl -f exits non-zero and the
          # workflow turns red automatically.
          # IMPORTANT: INVOCATIONS_URL already contains '?api-version=v1', so we
          # MUST append session id with '&' (not '?'). Two '?' chars cause Foundry
          # to reject with HTTP 400 "API version not supported" because the parser
          # reads api-version's value as "v1?agent_session_id=...".
          #
          # Retry loop: Foundry returns HTTP 424 session_not_ready under
          # simultaneous cold-starts (e.g., burst of N parallel issues) while
          # it spins up container instances. curl's --retry doesn't fire on
          # 4xx because the server "replied successfully" from curl's view —
          # so we own the retry in bash. Backoff: 8s, 16s, 32s, 64s. 408 /
          # 425 / 429 / 5xx also retried; everything else (including 200)
          # breaks.
          #
          # Budget tuned from live burst evidence (5-issue burst on v34: 3
          # of 5 failed after ~7 min). Foundry's parallel cold-start tops
          # out at 1-2 concurrent containers; bursts of 3+ queue at the
          # gateway, and once one container hits the MI/IMDS race those
          # requests can hang for 90-120s per attempt. 5 attempts × 180s
          # max-time + 8/16/32/64s backoff = ~16 min ceiling, which
          # comfortably absorbs deep cold-pool scale-up. Single-issue
          # cold-start unaffected (still resolves in <60s on attempt 1-2).
          attempt=0
          max_attempts=5
          while : ; do
            attempt=$((attempt+1))
            # Compute session_id for this attempt (see STABLE_BASE block
            # above for the full rationale).
            #   - issue.opened: fresh per-attempt id, no warm-path inheritance.
            #   - issue_comment.created attempt 1: stable per-issue id (warm
            #     path benefit when follow-ups arrive on a still-hot
            #     container).
            #   - issue_comment.created attempt 2+: stable id with "-r{N}"
            #     suffix to break out of any session->wedged-container pin.
            if [ "$EVENT" = "issue.opened" ]; then
              SESSION_ID="${STABLE_BASE}-run${GITHUB_RUN_ID}-a${attempt}"
              echo "issue.opened session ID: ${SESSION_ID} (fresh per-attempt — no first-turn memory to preserve)."
            elif [ "$attempt" -gt 1 ]; then
              SESSION_ID="${STABLE_BASE}-r${attempt}"
              echo "Comment retry session ID: ${SESSION_ID} (uniquified to escape any wedged/stale session pin)."
            else
              SESSION_ID="${STABLE_BASE}"
            fi
            # Run curl in a way that does NOT trip `set -e` on failure: temporarily
            # disable -e around the call and capture both HTTP_CODE and curl's exit
            # status. Important because curl exit 28 (timeout) — which we WANT to
            # retry — would otherwise kill the script before the case below runs.
            # --max-time 180 caps a single attempt; Foundry warm responses are <30s
            # but burst-cold containers can take 90-120s to complete MI acquisition
            # + first LLM call.
            set +e
            HTTP_CODE=$(curl -sS -X POST "${INVOCATIONS_URL}&agent_session_id=${SESSION_ID}" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -H "Foundry-Features: HostedAgents=V1Preview" \
              --data-binary @/tmp/payload.json \
              --max-time 180 \
              -o /tmp/reply.txt \
              -w '%{http_code}')
            CURL_EXIT=$?
            set -e
            # Treat curl-level failures (timeout=28, conn-refused=7, etc.) as a
            # synthetic "000" status so the retry case-statement handles them.
            if [ "$CURL_EXIT" -ne 0 ]; then
              echo "Attempt ${attempt}/${max_attempts}: curl exit=${CURL_EXIT} (HTTP=${HTTP_CODE:-none}) — treating as transient."
              HTTP_CODE="000"
            else
              echo "Attempt ${attempt}/${max_attempts}: HTTP ${HTTP_CODE}"
            fi
            case "$HTTP_CODE" in
              200) break ;;
              000|408|424|425|429|5??)
                if [ "$attempt" -ge "$max_attempts" ]; then
                  echo "::warning::Giving up after ${attempt} attempts (last HTTP ${HTTP_CODE})."
                  break
                fi
                backoff=$((8 * (2 ** (attempt - 1))))
                echo "Transient HTTP ${HTTP_CODE} — sleeping ${backoff}s before retry."
                sleep "$backoff"
                ;;
              *) break ;;
            esac
          done
          echo "HTTP: $HTTP_CODE"
          echo "Agent response body:"
          cat /tmp/reply.txt
          echo

          # Preserve the session_id of the LAST attempt so the diagnostic
          # step below can pull container stdout for that exact session.
          echo "${SESSION_ID}" > /tmp/last-session-id.txt

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Foundry returned HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Capture Foundry container logstream (on failure)
        # Best-effort: when the invoke step fails (typically with a sticky
        # 424 or 5xx after all retries are exhausted), call Foundry's
        # undocumented `:logstream` endpoint to pull the container's stdout
        # for the failing session and upload it as a workflow artifact. This
        # gives us a one-step path from "workflow failed" to "exactly which
        # line in Program.cs blew up", instead of having to spelunk App
        # Insights traces for a session that may never have produced any
        # because it died pre-readiness.
        #
        # We don't fail the workflow on this step — `continue-on-error: true`
        # plus best-effort `set +e` inside the script. The artifact upload
        # step below will publish whatever we managed to capture.
        if: failure()
        continue-on-error: true
        env:
          INVOCATIONS_URL: ${{ vars.FOUNDRY_INVOCATIONS_URL }}
        run: |
          set +e
          mkdir -p /tmp/foundry-logs
          touch /tmp/foundry-logs/logstream.txt
          SID=$(cat /tmp/last-session-id.txt 2>/dev/null || echo "")
          if [ -z "$SID" ]; then
            echo "No last session id captured — skipping logstream."
            echo "No session id captured." > /tmp/foundry-logs/logstream.txt
            exit 0
          fi
          # Derive the logstream URL from INVOCATIONS_URL. The invocations
          # endpoint is shaped:
          #   https://<project>.../agents/<name>/versions/<ver>/invocations?api-version=v1
          # The control-plane logstream endpoint is:
          #   https://<project>.../agents/<name>/versions/<ver>/sessions/<sid>:logstream?api-version=2025-11-15-preview
          BASE_URL="${INVOCATIONS_URL%%\?*}"      # strip query string
          BASE_URL="${BASE_URL%/invocations}"     # strip /invocations suffix
          LOG_URL="${BASE_URL}/sessions/${SID}:logstream?api-version=2025-11-15-preview"
          echo "Logstream URL: ${LOG_URL}"
          # Re-mint a token (the original one was scoped in the previous step).
          TOKEN=$(az account get-access-token --resource https://ai.azure.com --query accessToken -o tsv 2>/dev/null)
          if [ -z "$TOKEN" ]; then
            echo "Could not mint Azure token — skipping logstream."
            echo "No Azure token available." > /tmp/foundry-logs/logstream.txt
            exit 0
          fi
          # SSE stream; cap at 30s and 1MB so this step can't hang the workflow.
          curl -sS --max-time 30 --max-filesize 1048576 \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: text/event-stream" \
            "${LOG_URL}" \
            -o /tmp/foundry-logs/logstream.txt
          echo "Captured $(wc -c < /tmp/foundry-logs/logstream.txt) bytes of logstream."
          echo "--- first 4KB of logstream ---"
          head -c 4096 /tmp/foundry-logs/logstream.txt || true
          echo
          echo "--- end ---"

      - name: Upload Foundry logstream artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: foundry-logstream-${{ github.run_id }}-${{ github.run_attempt }}
          path: /tmp/foundry-logs/
          if-no-files-found: ignore
          retention-days: 14
