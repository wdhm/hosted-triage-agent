# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: triage-agent
description: |
    GitHub issue triage agent. Reads an issue title + body (with optional logs / stack traces) and returns a structured triage assessment (severity, category, summary, root cause, suggested labels, next actions) as JSON. Uses gpt-5-mini via the Foundry project's Responses API with strict JSON-schema output.
metadata:
    tags:
        - Triage
        - GitHub Issues
        - Invocations Protocol
        - Agent Framework
        - Structured Output
protocols:
    - protocol: invocations
      version: 1.0.0
resources:
    cpu: "1.0"
    memory: 2Gi
