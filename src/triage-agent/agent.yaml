# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: triage-agent
description: |
    A minimal echo agent hosted as a Foundry Hosted Agent using the Invocations protocol and the Agent Framework. Reads the request body as plain text, echoes it back in the response. No LLM or Azure credentials are required.
metadata:
    tags:
        - AI Agent Hosting
        - Azure AI AgentServer
        - Invocations Protocol
        - Agent Framework
protocols:
    - protocol: invocations
      version: 1.0.0
resources:
    cpu: "0.5"
    memory: 1Gi
